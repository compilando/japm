version: '3.8'

services:
  # ===================================
  # JAPM API Service
  # ===================================
  japm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japm-api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./data/japm.db
    volumes:
      # Mount database directory for persistence
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - japm-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===================================
  # PostgreSQL Database (Production)
  # ===================================
  postgres:
    image: postgres:15-alpine
    container_name: japm-postgres
    environment:
      POSTGRES_DB: japm
      POSTGRES_USER: japm_user
      POSTGRES_PASSWORD: japm_password_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - japm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U japm_user -d japm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================
  # MySQL Database (Alternative)
  # ===================================
  mysql:
    image: mysql:8.0
    container_name: japm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secure
      MYSQL_DATABASE: japm
      MYSQL_USER: japm_user
      MYSQL_PASSWORD: japm_password_secure
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - japm-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "japm_user", "-pjapm_password_secure"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================
  # Redis Cache (Optional)
  # ===================================
  redis:
    image: redis:7-alpine
    container_name: japm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - japm-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===================================
  # Development Service (with hot reload)
  # ===================================
  japm-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: japm-dev
    ports:
      - "3001:3001"
      - "9229:9229"  # Debug port
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./data/japm.db
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - japm-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  japm-network:
    driver: bridge 